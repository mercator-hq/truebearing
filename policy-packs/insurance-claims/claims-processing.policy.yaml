# Pattern: Insurance Claims Processing — Sequential approval guard with PII taint isolation
#
# Risk mitigated: A claims processing agent with write access to a claims management system
# can cause regulatory violations and fraudulent payouts if it approves a claim without
# completing the mandatory multi-step verification chain. State insurance regulations
# typically require that every claim decision be supported by documented fraud assessment,
# policy verification, and damage assessment. Manual enforcement of this requirement in
# agent code is brittle; this policy enforces it structurally and creates a tamper-evident
# audit trail for regulatory examination.
#
# Core guarantee: approve_claim may only run after verify_policy, assess_damage, and
# check_fraud_signals have all completed. Claimant PII accessed in the session taints
# the session until an explicit compliance check clears it. Claims above the threshold
# always escalate to a human adjudicator regardless of automated prerequisites.
#
# Key patterns in this pack:
#   1. Sequential approval guard (only_after) — three mandatory prerequisites before approval
#   2. Minimum-count fraud check (requires_prior_n) — at least one fraud check per session
#   3. PII taint (taint.applies) — session marked sensitive on claimant data access
#   4. Compliance gate (taint.clears) — PII taint must be cleared before claim approval
#   5. High-value claim escalation (escalate_when) — human adjudicator on large claims
#   6. Budget guard — hard cap on automated approvals per session
#
# How to adopt this policy:
#   1. Replace tool names with your actual tool names (e.g., query_pii, adjudicate_claim).
#   2. Adjust escalate_when value to your organisation's manual review threshold.
#   3. Run: truebearing policy lint claims-processing.policy.yaml
#   4. Register: truebearing agent register claims-agent --policy ./claims-processing.policy.yaml
#   5. Run in shadow mode first. Review: truebearing audit query --decision shadow_deny
#   6. When shadow_deny records confirm the policy matches your intent, flip to block.
#
# Regulatory context: Satisfies state insurance regulatory audit trail requirements.
# Most US state insurance regulations (e.g., NY Ins. Law §2601, CA Ins. Code §790.03)
# require that claims be handled promptly and fairly, with documented assessment steps.
# A TrueBearing audit log provides immutable, Ed25519-signed evidence that every approved
# claim passed through the required verification sequence — supporting both internal audit
# and external regulatory examination without requiring custom audit infrastructure.

version: "1"
agent: claims-agent
enforcement_mode: shadow  # Flip to block after shadow-mode review confirms correctness.

session:
  max_history: 500
  max_duration_seconds: 7200  # 2-hour claims session. Adjust to your workflow cadence.

budget:
  max_tool_calls: 150         # An agent loop processing 150 steps without human review is a flag.
  max_cost_usd: 5.00

# Whitelist: only tools listed here may be called. Anything not listed is denied before
# any other check runs, regardless of enforcement_mode.
# check_escalation_status is a virtual tool injected by TrueBearing — always include it.
may_use:
  - verify_policy
  - assess_damage
  - check_fraud_signals
  - read_claimant_pii
  - run_compliance_check
  - approve_claim
  - deny_claim
  - check_escalation_status

tools:
  approve_claim:
    # BLOCK-level override: claim approvals trigger payment. Shadow mode is not safe here.
    # Even if the global policy is shadow, a violation on approve_claim is always a hard deny.
    enforcement_mode: block

    sequence:
      # PREREQUISITE CHAIN: all three steps must complete before a claim may be approved.
      # This is the core regulatory sequence. Approving a claim without verifying policy
      # coverage, assessing the damage, and checking fraud signals is the primary failure
      # mode in automated claims processing — whether accidental or adversarial.
      #
      # Verify policy coverage before approving: submitting a claim against a lapsed,
      # excluded, or inapplicable policy wastes carrier and claimant time and may constitute
      # a bad-faith claims practice under state unfair claims settlement laws.
      only_after:
        - verify_policy        # Confirm the policy is in-force and covers the claimed event
        - assess_damage        # Document the extent and nature of the loss
        - check_fraud_signals  # Screen for known fraud patterns before committing payment

      # PII EXFILTRATION GUARD: if claimant PII was accessed this session, block approval
      # until run_compliance_check explicitly clears the taint. This ensures that the agent
      # has certified that only the minimum-necessary PII was used in the claim decision,
      # supporting compliance with applicable state privacy laws and CCPA obligations.
      never_after:
        - read_claimant_pii

      # MINIMUM FRAUD-CHECK COUNT: at least one fraud signal check must have run in this
      # session. Protects against batch-processing flows where check_fraud_signals ran for
      # a different claim set than the one being approved. Increase count for workflows
      # where each claim requires multiple independent fraud screenings.
      requires_prior_n:
        tool: check_fraud_signals
        count: 1

    # HIGH-VALUE CLAIM ESCALATION: claims above this threshold require human adjudicator
    # review before automated approval. Adjust the value to match your state's required
    # manual review threshold or your internal large-loss protocol.
    escalate_when:
      argument_path: "$.claim_amount_usd"
      operator: ">"
      value: 25000

  read_claimant_pii:
    taint:
      # Reading claimant PII — name, address, SSN, date of birth, policy number, or any
      # personally identifiable information tied to the claimant — taints the session.
      # The taint persists until run_compliance_check explicitly clears it, ensuring that
      # claim approval cannot proceed without a minimum-necessary certification step.
      applies: true
      label: claimant_pii_accessed

  run_compliance_check:
    taint:
      # The compliance check certifies that the PII accessed in this session was limited
      # to what is necessary for the claim decision and that its use is documented.
      # On completion, the claimant_pii_accessed taint is cleared.
      #
      # Design: run_compliance_check is always allowed even when the session is tainted,
      # because it is the only path to clearing the taint. Do not add never_after guards
      # to this tool or it cannot be called to perform the clearance.
      clears: true

  # The following tools carry no additional rules beyond the may_use whitelist and budget.
  # Add sequence, taint, or escalation guards below if your workflow requires them.
  verify_policy: {}
  assess_damage: {}
  check_fraud_signals: {}
  deny_claim: {}
