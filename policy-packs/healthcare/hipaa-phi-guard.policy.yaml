# Pattern: HIPAA PHI Guard — Taint on PHI access with compliance gate before submission
#
# Risk mitigated: A healthcare billing or claims agent that reads protected health information
# (PHI) and then submits a claim to an external payer before running a compliance scan could
# inadvertently transmit more PHI than is required for the claim. The HIPAA minimum-necessary
# standard (45 CFR §164.502(b)) requires that disclosures include only the minimum PHI needed
# to accomplish the intended purpose. Manual enforcement of this rule in agent code is brittle;
# this policy enforces it structurally.
#
# Core guarantee: once PHI enters the session context, no outbound submission or transmission
# tool may run until a compliance scan explicitly clears the taint.
#
# Key patterns in this pack:
#   1. PHI taint (taint.applies) — session is immediately marked sensitive on PHI access
#   2. Compliance gate (taint.clears) — explicit clearance before any submission
#   3. Prerequisite chain (only_after) — eligibility and record must be read before submission
#   4. Exfiltration block (never_after) — block submission while session is PHI-tainted
#   5. High-value claim escalation (escalate_when) — human review on large claims
#   6. Budget guard — hard cap on automated claim submissions per session
#
# How to adopt this policy:
#   1. Replace tool names with your actual tool names (e.g., pull_ehr_record, send_claim_clearinghouse).
#   2. Adjust escalate_when value to your organisation's threshold for manual review.
#   3. Run: truebearing policy lint hipaa-phi-guard.policy.yaml
#   4. Register your agent: truebearing agent register billing-agent --policy ./hipaa-phi-guard.policy.yaml
#   5. Run in shadow mode. Review: truebearing audit query --decision shadow_deny
#   6. When satisfied, flip to enforcement_mode: block.
#
# Note: This policy does not replace a formal HIPAA compliance programme. It is one
# technical control in a defence-in-depth strategy. Consult your compliance officer.

version: "1"
agent: billing-agent
enforcement_mode: block  # PHI disclosure is not a shadow-mode scenario. Enforce from day one.

session:
  max_history: 500
  max_duration_seconds: 3600  # 1-hour session. PHI sessions should be short-lived.

budget:
  max_tool_calls: 100         # Hard cap. A claims loop submitting 100 claims without review is a bug.
  max_cost_usd: 2.00

# Whitelist: only tools listed here may be called.
# check_escalation_status is injected by TrueBearing — always include it.
may_use:
  - read_patient_record
  - verify_eligibility
  - read_phi
  - run_compliance_scan
  - submit_claim
  - export_report
  - check_escalation_status

tools:
  submit_claim:
    sequence:
      # PREREQUISITE CHAIN: eligibility and patient record must be verified before
      # a claim is submitted. Submitting without eligibility check risks denial and
      # rework. Submitting without reading the record is an incomplete submission.
      only_after:
        - verify_eligibility
        - read_patient_record

      # PHI EXFILTRATION BLOCK: if PHI was accessed this session, block claim submission
      # until run_compliance_scan explicitly clears the taint. This enforces the
      # minimum-necessary standard — the agent must certify what it is including before
      # it can send anything externally.
      never_after:
        - read_phi

    # HIGH-VALUE CLAIM ESCALATION: claims above this threshold require human review
    # before submission. Adjust to match your organisation's manual review policy.
    escalate_when:
      argument_path: "$.claim_amount_usd"
      operator: ">"
      value: 5000

  export_report:
    sequence:
      # Reports may also contain PHI. Apply the same exfiltration block as submit_claim.
      # If your reporting workflow is PHI-free, remove this never_after rule.
      never_after:
        - read_phi

  read_phi:
    taint:
      # Reading PHI taints the session immediately. This covers any access to protected
      # health information: patient demographics, diagnosis codes, treatment records,
      # insurance member identifiers, or any individually identifiable health data.
      #
      # The taint persists until run_compliance_scan explicitly clears it. Any tool
      # protected by never_after: [read_phi] will be blocked in the interim.
      applies: true
      label: phi_accessed

  run_compliance_scan:
    taint:
      # The compliance scan confirms that the data prepared for submission contains
      # only the minimum necessary PHI for the claim. On success, the phi_accessed
      # taint is cleared and submit_claim and export_report become callable again.
      #
      # Design: compliance scan is always allowed even when the session is tainted,
      # because it is the only path to clearing the taint. Do not add never_after
      # guards to this tool.
      clears: true

  # The following tools carry no additional sequence, taint, or escalation rules
  # beyond the may_use whitelist and budget. Add guards if your workflow requires them.
  read_patient_record: {}
  verify_eligibility: {}
