# Pattern: Production Guard — Sequence guards and taint isolation for CI/CD deploy workflows
#
# Risk mitigated: A deployment agent with write access to production infrastructure can cause
# outages, data loss, or security regressions if it deploys directly to production without
# completing the required validation chain. The classic failure mode: deploy_production runs
# before integration tests, or deploys code that was force-pushed without a code review.
# Rollback in production is rarely instant and is never free.
#
# Core guarantee: production deployments can only proceed after the full validation chain
# is satisfied. Force-pushed or unreviewed code taints the session and blocks production
# deploys until an explicit sign-off gate clears the taint.
#
# Key patterns in this pack:
#   1. Deploy sequence guard (only_after) — test → build → stage → verify → promote
#   2. Force-push isolation (taint.applies) — block production if unreviewed code present
#   3. Sign-off gate (taint.clears) — explicit engineering approval clears the taint
#   4. Destructive-action escalation (escalate_when) — human approval for production promotes
#   5. Rollback protection (only_after) — rollback requires a post-mortem ticket first
#   6. Budget guard — hard cap on automated deploys per session
#
# How to adopt this policy:
#   1. Replace tool names with your actual tool names (e.g., gh_deploy, kubectl_apply, argo_sync).
#   2. Adjust escalate_when value or operator to match your org's deploy approval process.
#   3. Run: truebearing policy lint production-guard.policy.yaml
#   4. Register: truebearing agent register deploy-agent --policy ./production-guard.policy.yaml
#   5. Run in shadow mode against your staging pipeline first. Review:
#      truebearing audit query --decision shadow_deny
#   6. When satisfied, flip to enforcement_mode: block.
#
# Environment isolation note: a future DSL version will add require_env: production to prevent
# production-scoped tools from running against a staging endpoint. Until then, enforce
# environment separation at the infrastructure level (separate proxy instances per environment,
# separate policy files, separate agent JWTs).

version: "1"
agent: deploy-agent
enforcement_mode: shadow  # Flip to block once you have validated the sequence matches your pipeline.

session:
  max_history: 200          # Deploy sessions are short. If you hit 200 events something went wrong.
  max_duration_seconds: 3600 # 1-hour deploy window. Long-running deploy sessions are a red flag.

budget:
  max_tool_calls: 50         # A single deploy cycle should not exceed 50 tool calls.
  max_cost_usd: 5.00

# Whitelist: only these tools may be called.
# check_escalation_status is injected by TrueBearing — always include it.
may_use:
  - run_tests
  - build_artifact
  - deploy_staging
  - run_integration_tests
  - sign_off_deploy
  - deploy_production
  - rollback_production
  - open_incident_ticket
  - force_push_override
  - check_escalation_status

tools:
  deploy_staging:
    sequence:
      # Tests must pass and a build artifact must exist before staging deployment.
      # Deploying untested or unbuilt code to staging pollutes the validation environment.
      only_after:
        - run_tests
        - build_artifact

  run_integration_tests:
    sequence:
      # Integration tests are only meaningful after a staging deploy completes.
      # Running them against a stale staging environment produces false confidence.
      only_after:
        - deploy_staging

  deploy_production:
    # BLOCK-level override: production deploys are always hard-enforced.
    # Shadow mode is not safe for production — a missed violation could cause an outage.
    enforcement_mode: block

    sequence:
      # FULL VALIDATION CHAIN: the complete staging pipeline must have run in this session
      # before production is touched.
      only_after:
        - run_tests
        - build_artifact
        - deploy_staging
        - run_integration_tests
        - sign_off_deploy  # Engineering lead or on-call must explicitly sign off

      # FORCE-PUSH ISOLATION: if a force push overrode the branch protection rules,
      # the session is tainted — code review may have been bypassed. Block production
      # deployment until an explicit sign-off gate clears the taint.
      never_after:
        - force_push_override

    # PRODUCTION ESCALATION: every production deploy requires human approval regardless
    # of whether the sequence is satisfied. This provides a final circuit breaker for
    # late-breaking concerns (incidents in flight, freeze windows, etc.).
    #
    # Set operator to "==" and value to 1 to escalate every deploy unconditionally.
    escalate_when:
      argument_path: "$.target_environment"
      operator: "=="
      value: "production"

  rollback_production:
    enforcement_mode: block

    sequence:
      # Rollback must be preceded by an open incident ticket. Rolling back without a
      # ticket makes it impossible to determine the rollback's cause in a post-mortem.
      only_after:
        - open_incident_ticket

  force_push_override:
    taint:
      # A force push bypasses branch protection. Once this tool has been called, the
      # session is tainted — code review integrity is uncertain. Any subsequent
      # deploy_production call is blocked until sign_off_deploy explicitly clears the taint.
      applies: true
      label: force_push_detected

  sign_off_deploy:
    taint:
      # An explicit engineering sign-off certifies that the current session's code has
      # been reviewed, even if it arrived via a force push. This clears the
      # force_push_detected taint and allows deploy_production to proceed.
      clears: true

  # Tools with no additional rules beyond may_use and budget.
  run_tests: {}
  build_artifact: {}
  open_incident_ticket: {}
