# Pattern: Life Sciences — Regulatory Submission Guard for automated FDA regulatory workflows
#
# Risk mitigated: A regulatory affairs agent with write access to FDA submission portals
# can cause significant harm if it submits documents that have not completed the mandatory
# internal review chain, or if it submits a document that was amended after final legal
# sign-off. A premature or inconsistent FDA submission may trigger a refuse-to-file
# determination or regulatory action and cannot be retracted once accepted by the agency.
# The reputational and operational cost of a defective submission — including potential
# FDA warning letters and programme delays — far exceeds the cost of enforcing process
# discipline upfront.
#
# Core guarantee: submit_to_fda may only run after generate_draft, internal_review, and
# legal_sign_off have all completed in this session. Any call to amend_document permanently
# blocks submission for the remainder of the session — amendments require a fresh review
# cycle in a new session. All FDA submissions trigger human escalation regardless of prior
# automated approvals.
#
# Key patterns in this pack:
#   1. Mandatory review chain (only_after) — draft → review → sign-off before any submission
#   2. Post-amendment block (never_after) — any amendment permanently blocks submission
#   3. Unconditional submission escalation (escalate_when) — every submission requires sign-off
#   4. Budget guard — hard cap on automated actions per session
#
# How to adopt this policy:
#   1. Replace tool names with your actual system tool names.
#   2. Adjust escalate_when argument_path to match your submission schema.
#   3. Run: truebearing policy lint regulatory-submission.policy.yaml
#   4. Register: truebearing agent register regulatory-agent --policy ./regulatory-submission.policy.yaml
#   5. Run in shadow mode and review violations before enforcing.
#   6. Flip to enforcement_mode: block before connecting to a production submission portal.
#
# Regulatory context: Supports 21 CFR Part 11 electronic records and electronic signatures
# requirements. 21 CFR Part 11 requires that electronic records used in regulated activities
# are trustworthy, reliable, and equivalent to paper records. A TrueBearing audit log —
# with Ed25519 signatures over each decision record — provides the tamper-evident audit trail
# that demonstrates an unbroken chain of custody from draft creation through final submission.
# The sequence guard ensures that the audit trail records all required review steps, creating
# documentation that supports both FDA inspection and internal quality systems.

version: "1"
agent: regulatory-agent
enforcement_mode: shadow  # Flip to block before connecting to a production submission portal.

session:
  max_history: 500
  max_duration_seconds: 28800  # 8-hour work session for complex regulatory submissions.

budget:
  max_tool_calls: 100         # A submission workflow with 100+ automated steps warrants human review.
  max_cost_usd: 10.00

# Whitelist: only tools listed here may be called. Anything not listed is denied before
# any other check runs, regardless of enforcement_mode.
# check_escalation_status is a virtual tool injected by TrueBearing — always include it.
may_use:
  - generate_draft
  - amend_document
  - internal_review
  - legal_sign_off
  - submit_to_fda
  - archive_submission
  - check_escalation_status

tools:
  submit_to_fda:
    # BLOCK-level override: FDA submissions are irreversible once accepted by the agency.
    # Shadow mode is not appropriate for this tool — a shadow_deny would still allow the
    # submission to reach the upstream server and be transmitted to the FDA portal.
    enforcement_mode: block

    sequence:
      # MANDATORY REVIEW CHAIN: all three steps must have completed in this session before
      # submission is allowed. This is the core compliance sequence for regulated submissions.
      #
      # Regulatory basis: FDA reviewers expect that IND, NDA, BLA, 510(k), and eCTD
      # submissions reflect an internal scientific review process and legal certification.
      # Submissions without documented review and sign-off create grounds for a
      # refuse-to-file determination under 21 CFR §314.101 or §601.2.
      only_after:
        - generate_draft     # A draft must exist and be referenced in this session context
        - internal_review    # Scientific or regulatory team review must be documented
        - legal_sign_off     # Legal must certify the submission content before it goes out

      # POST-AMENDMENT SUBMISSION BLOCK: any call to amend_document in this session
      # permanently blocks submit_to_fda for the remainder of the session.
      #
      # Design: this is an intentionally conservative rule. The safer interpretation is
      # that any amendment invalidates the current review chain — the legal team signed a
      # potentially different version, and internal_review may not have seen the amendment.
      # Operators who need to amend-then-submit must ensure amendments occur before
      # legal_sign_off is called, not after. If an amendment is discovered to be necessary
      # after sign-off, start a new session and re-run the complete review chain on the
      # amended document. This creates a clean, auditable record of the amended submission.
      #
      # A never_after block is permanent for the session and cannot be cleared. This is
      # the correct behaviour for regulatory submissions where chain-of-custody integrity
      # must be unambiguous.
      never_after:
        - amend_document

    # UNCONDITIONAL SUBMISSION ESCALATION: every FDA submission requires human review
    # regardless of whether the automated review chain is fully satisfied. This provides
    # a final human circuit breaker for late-breaking concerns — safety signals, label
    # discrepancies, last-minute regulatory guidance changes, or submission portal issues
    # — that automated checks cannot anticipate.
    #
    # The escalation fires whenever submission_id is present (which it always must be).
    # Your tool must pass a non-empty submission_id argument for every submission call.
    escalate_when:
      argument_path: "$.submission_id"
      operator: "matches"
      value: ".+"  # matches any non-empty submission_id — all FDA submissions require human approval

  # amend_document: no additional rules beyond the may_use whitelist and budget.
  # The never_after guard on submit_to_fda is the sole enforcement mechanism — any call
  # to amend_document permanently blocks submission for the remainder of this session.
  # No taint is applied because there is no taint-clearing tool in this policy; the
  # permanent session block via never_after is the appropriate and sufficient control.
  amend_document: {}

  # The following tools carry no additional rules beyond the may_use whitelist and budget.
  # Add guards below if your workflow requires additional sequence or escalation logic.
  generate_draft: {}
  internal_review: {}
  legal_sign_off: {}
  archive_submission: {}
