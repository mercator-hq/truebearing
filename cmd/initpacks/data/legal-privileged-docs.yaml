# Pattern: Legal Ops — Privileged Document Guard for agentic document review
#
# Risk mitigated: A legal document review agent with access to matter management systems
# and external communication tools can inadvertently breach attorney-client privilege if
# it transmits privileged documents or derived analysis to external parties without
# explicit authorisation. Attorney-client privilege is waived by voluntary disclosure to
# third parties; an autonomous agent that routes privileged content externally — even by
# accident — may cause irreversible privilege loss that cannot be remedied after the fact.
#
# Core guarantee: once a privileged document has been read in this session, no external
# transmission tool may run until a privilege review explicitly clears the taint. Any
# action on a matter with active_litigation status triggers human escalation regardless
# of whether sequence prerequisites are met.
#
# Key patterns in this pack:
#   1. Privilege taint (taint.applies) — session marked sensitive on privileged document access
#   2. Privilege review gate (taint.clears) — explicit attorney clearance before external comms
#   3. External transmission block (never_after) — block all outbound actions while tainted
#   4. Summary generation block (never_after) — prevent privilege contamination in AI outputs
#   5. Active litigation escalation (escalate_when) — human review for contested matters
#   6. Budget guard — hard cap on automated document actions per session
#
# How to adopt this policy:
#   1. Replace tool names with your actual tool names (e.g., read_matter_doc, send_correspondence).
#   2. Adjust escalate_when to match your matter status field name in tool arguments.
#   3. Run: truebearing policy lint privileged-document-guard.policy.yaml
#   4. Register: truebearing agent register legal-ops-agent --policy ./privileged-document-guard.policy.yaml
#   5. Run in shadow mode first. Review: truebearing audit query --decision shadow_deny
#   6. When satisfied, flip transmit_to_external and generate_summary to enforcement_mode: block.
#
# Legal context: Addresses attorney-client privilege protection for agentic document review.
# The attorney-client privilege (Upjohn Co. v. United States, 449 U.S. 383 (1981)) protects
# confidential communications between attorneys and clients made for the purpose of obtaining
# or providing legal advice. Disclosure to third parties without authorisation waives the
# privilege. An AI agent that reads and then re-routes privileged content is a disclosure.
# This policy enforces that no content read from a privileged document can be transmitted
# externally without an explicit privilege review, creating an audit trail that supports
# both internal responsibility assignment and external examination in the event of a
# privilege dispute.

version: "1"
agent: legal-ops-agent
enforcement_mode: shadow  # Flip to block once policy is validated against real workflows.

session:
  max_history: 500
  max_duration_seconds: 14400  # 4-hour document review session.

budget:
  max_tool_calls: 200         # Document review sessions may be long. Adjust to your workflow.
  max_cost_usd: 10.00

# Whitelist: only tools listed here may be called. Anything not listed is denied before
# any other check runs, regardless of enforcement_mode.
# check_escalation_status is a virtual tool injected by TrueBearing — always include it.
may_use:
  - read_document
  - read_privileged_document
  - search_matter
  - annotate_document
  - run_privilege_review
  - transmit_to_external
  - generate_summary
  - check_escalation_status

tools:
  transmit_to_external:
    # BLOCK-level override: external transmission of potentially privileged content is
    # irreversible. Shadow mode is not safe for this tool — a shadow_deny would still
    # allow the transmission to reach the upstream server and leave the organisation.
    enforcement_mode: block

    sequence:
      # PRIVILEGE EXFILTRATION BLOCK: if a privileged document was read in this session,
      # the session context may contain attorney-client privileged material. Block all
      # external transmission until run_privilege_review explicitly certifies that the
      # content being sent is not privileged, or that transmission to the specific
      # recipient is authorised by the supervising attorney.
      #
      # The block is permanent for this session. If a privilege review is needed to
      # clear the taint, it must occur before transmission is attempted again.
      never_after:
        - read_privileged_document

    # ACTIVE LITIGATION ESCALATION: any external transmission in an active litigation
    # matter requires attorney review regardless of privilege status. Even non-privileged
    # matter communications during litigation carry strategic and legal risk; inadvertent
    # disclosure of litigation strategy, work product, or negotiating position can have
    # material impact on the matter outcome.
    escalate_when:
      argument_path: "$.matter_status"
      operator: "=="
      value: "active_litigation"

  generate_summary:
    sequence:
      # PRIVILEGE CONTAMINATION GUARD: if a privileged document was read in this session,
      # any AI-generated summary may reflect, paraphrase, or reproduce privileged content.
      # A summary transmitted to a third party could waive privilege even if the original
      # document is never shared directly. Block summary generation while the session
      # is tainted; run_privilege_review must run first.
      never_after:
        - read_privileged_document

  read_privileged_document:
    taint:
      # Reading a document marked as privileged — attorney work product, client
      # communications, legal strategy memoranda, or any document withheld from
      # discovery on privilege grounds — taints the session immediately. The taint
      # persists until run_privilege_review explicitly clears it.
      #
      # What counts as privileged: communications between attorney and client made for
      # the purpose of obtaining or providing legal advice; attorney work product created
      # in anticipation of litigation. When classification is uncertain, err toward
      # treating the document as privileged and requiring a review step.
      applies: true
      label: privileged_document_accessed

  run_privilege_review:
    taint:
      # The privilege review step assesses what content from this session may be
      # transmitted externally and whether the intended transmission is authorised.
      # On completion, the privileged_document_accessed taint is cleared.
      #
      # Design: run_privilege_review is always allowed even when the session is tainted,
      # because it is the only path to clearing the taint. Do not add never_after guards
      # to this tool or it cannot be called to perform the clearance.
      clears: true

  # The following tools carry no additional rules beyond the may_use whitelist and budget.
  # Add guards below if your workflow requires additional sequence or escalation logic.
  read_document: {}
  search_matter: {}
  annotate_document: {}
