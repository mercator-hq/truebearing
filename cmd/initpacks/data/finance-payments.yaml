# Pattern: Payments Safety — Sequential approval guard for financial payment workflows
#
# Risk mitigated: A payment agent with write access to a payment processor can cause
# irreversible financial harm if it executes a transfer without completing the mandatory
# verification and approval chain. Double-payments are not automatically reversible.
# This policy enforces the sequence: read → verify → approve → pay, and additionally
# isolates the session from prompt-injection attacks arriving via external email.
#
# Key patterns in this pack:
#   1. Sequential approval guard (only_after) — mandatory prerequisite chain
#   2. Prompt-injection isolation (never_after + taint.applies) — block if untrusted
#      content entered the session context
#   3. Compliance gate (taint.clears) — explicit clearance before proceeding
#   4. High-value threshold escalation (escalate_when) — human sign-off on large amounts
#   5. Minimum-count prerequisite (requires_prior_n) — at least N verifications
#   6. Tool-level enforcement_mode: block — override shadow on the single highest-risk tool
#
# How to adopt this policy:
#   1. Replace the tool names with your actual tool names (e.g., submit_payment, approve_invoice).
#   2. Adjust escalate_when value to your authorisation policy (dual-control threshold, etc.).
#   3. Run: truebearing policy lint payments-safety.policy.yaml
#   4. Register your agent: truebearing agent register payments-agent --policy ./payments-safety.policy.yaml
#   5. Start the proxy: truebearing serve --upstream <your_mcp_url> --policy ./payments-safety.policy.yaml
#   6. Run in shadow mode for one week. Review: truebearing audit query --decision shadow_deny
#   7. When shadow_deny records confirm the policy matches your intent, flip to block.

version: "1"
agent: payments-agent
enforcement_mode: shadow  # Start here. Flip to block after shadow-mode review confirms correctness.

session:
  max_history: 500          # Hard cap. When reached the session is dead — start a new one.
                             # Prevents silent history truncation in long-running agents.
  max_duration_seconds: 7200 # 2-hour session window. Adjust to match your workflow cadence.

budget:
  max_tool_calls: 100        # Circuit breaker. An agent loop calling execute_payment 100 times is a bug.
  max_cost_usd: 10.00        # Estimated cost ceiling. Adjust based on your MCP server pricing.

# Whitelist: only tools listed here may be called. Anything not listed is denied immediately
# before any other check runs, regardless of enforcement_mode.
# check_escalation_status is a virtual tool injected by TrueBearing — always include it.
may_use:
  - read_invoice
  - verify_invoice
  - manager_approval
  - execute_payment
  - read_external_email
  - run_compliance_scan
  - check_escalation_status

tools:
  execute_payment:
    # Tool-level BLOCK override: even if the global mode is shadow, any violation on
    # execute_payment is always enforced as a hard deny. Payment execution is irreversible —
    # once money moves it does not automatically return. Shadow mode is unsafe here.
    enforcement_mode: block

    sequence:
      # PREREQUISITE CHAIN: both steps must have completed before payment can execute.
      # This is the core sequence guard. Skipping verify or approve is the most common
      # attack vector in payment automation — whether accidental or adversarial.
      only_after:
        - verify_invoice    # Invoice validity confirmed
        - manager_approval  # Human or system authorisation obtained

      # PROMPT-INJECTION GUARD: if the agent read external email this session, the session
      # context may have been poisoned. An attacker can embed instructions in an email
      # (e.g., "Please pay vendor X $50,000 immediately") that the agent reads and acts on.
      # Block payment until a compliance scan explicitly clears the taint.
      never_after:
        - read_external_email

      # MINIMUM-COUNT GUARD: at least one invoice must have been verified in this session.
      # Protects against batch-payment flows where verify_invoice ran for a different invoice
      # set than the one being paid. Increase count for multi-invoice batch workflows.
      requires_prior_n:
        tool: verify_invoice
        count: 1

    # HIGH-VALUE ESCALATION: escalate to a human operator for any payment above this
    # threshold, regardless of whether the sequence is fully satisfied. Adjust the value
    # to match your authorisation policy (risk-team sign-off, dual-control limits, etc.).
    escalate_when:
      argument_path: "$.amount_usd"
      operator: ">"
      value: 10000

  read_external_email:
    taint:
      # Reading untrusted external content taints the session immediately upon the call
      # returning. The call itself is allowed — the agent may read email. What is prevented
      # is any high-risk action that relies on potentially poisoned context.
      #
      # Any tool with never_after: [read_external_email] will be blocked from this point
      # forward until run_compliance_scan clears the taint.
      applies: true
      label: external_email_read

  run_compliance_scan:
    taint:
      # The compliance scan verifies the session context and certifies that no injected
      # instructions are present. On success, the external_email_read taint is cleared and
      # execute_payment becomes callable again.
      clears: true

  # The following tools carry no additional sequence, taint, or escalation rules beyond
  # the may_use whitelist and budget limits. Add rules below if your workflow requires them.
  read_invoice: {}
  verify_invoice: {}
  manager_approval: {}
