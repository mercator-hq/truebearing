name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod declares go 1.25.0 as the minimum. The matrix covers the declared
        # minimum and the latest stable so we catch regressions on both boundaries.
        go-version: ['1.25', 'stable']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "The following files are not gofmt'd:"
            echo "$output"
            exit 1
          fi

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags integration ./...
